name: DotNet CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'documentation/**'
      - 'docs/**'
      - 'azure-pipelines.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'documentation/**'
      - 'docs/**'
      - 'azure-pipelines.yml'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  pg_db: marten_testing
  pg_user: postgres
  CONFIGURATION: Release
  FRAMEWORK: net9.0
  DISABLE_TEST_PARALLELIZATION: true
  NUKE_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 9.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install .NET 10.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: compile
        run: ./build.sh compile
        shell: bash

      - name: test-core
        if: ${{ success() || failure() }}
        run: ./build.sh test-core
        shell: bash

      - name: test-codegen
        if: ${{ success() || failure() }}
        run: ./build.sh test-codegen
        shell: bash

      - name: test-command-line
        if: ${{ success() || failure() }}
        run: ./build.sh test-command-line
        shell: bash

      # Smoke test the usage/help renderer end-to-end. `help describe` renders a
      # NetCoreInput-derived command, which exercises the nullable-enum --log-level
      # flag that crashed usage rendering in jasperfx#441. A non-zero exit fails CI.
      - name: smoke-test-help
        if: ${{ success() || failure() }}
        run: |
          dotnet run --project src/CommandLineRunner --framework net9.0 -- help
          dotnet run --project src/CommandLineRunner --framework net9.0 -- help describe
        shell: bash

      - name: smoke-test-aot
        if: ${{ success() || failure() }}
        run: ./build.sh smoke-test-aot
        shell: bash
