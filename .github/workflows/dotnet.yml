name: DotNet CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'documentation/**'
      - 'docs/**'
      - 'azure-pipelines.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'documentation/**'
      - 'docs/**'
      - 'azure-pipelines.yml'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  pg_db: marten_testing
  pg_user: postgres
  CONFIGURATION: Release
  FRAMEWORK: net9.0
  DISABLE_TEST_PARALLELIZATION: true
  NUKE_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 9.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install .NET 10.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: compile
        run: ./build.sh compile
        shell: bash

      - name: test-core
        if: ${{ success() || failure() }}
        run: ./build.sh test-core
        shell: bash

      - name: test-codegen
        if: ${{ success() || failure() }}
        run: ./build.sh test-codegen
        shell: bash

      # Regenerates the F# fixture from the emitters and compiles it with the in-box F# compiler.
      # The `compile` step above only builds the *committed* Generated.fs, so this is what catches
      # the fixture drifting from the code generation that produces it (jasperfx#513).
      - name: test-codegen-fsharp
        if: ${{ success() || failure() }}
        run: ./build.sh test-codegen-fsharp
        shell: bash

      - name: test-command-line
        if: ${{ success() || failure() }}
        run: ./build.sh test-command-line
        shell: bash

      - name: test-events
        if: ${{ success() || failure() }}
        run: ./build.sh test-events
        shell: bash

      - name: test-event-store
        if: ${{ success() || failure() }}
        run: ./build.sh test-event-store
        shell: bash

      # End-to-end CLI smoke tests, including `codegen preview --language fsharp`: proves the F# flag
      # is wired through the CLI and the F# emit path runs without throwing. It does NOT prove the
      # output compiles -- `preview` only prints, and GeneratorTarget feeds codegen a raw C# CodeFrame
      # (a documented passthrough), so its F# preview is knowingly not valid F#. The compile proof is
      # test-codegen-fsharp above. Also covers the C# `codegen preview` and the `describe` flag
      # variants, none of which ran in CI before. These commands all exit 0 (unlike smoke-test-help
      # below), so the Nuke target gates on the exit code directly.
      - name: smoke-test-commands
        if: ${{ success() || failure() }}
        run: ./build.sh smoke-test-commands
        shell: bash

      # Smoke test the usage/help renderer end-to-end. `help describe` renders a
      # NetCoreInput-derived command, which exercises the nullable-enum --log-level
      # flag that crashed usage rendering in jasperfx#441.
      #
      # NOTE: `help <command>` intentionally returns a non-zero exit code (it renders
      # usage rather than running a command), so we do NOT gate on the exit code.
      # Instead we fail only if usage rendering actually crashed -- #441 surfaced as an
      # unhandled exception + stack trace in the output.
      - name: smoke-test-help
        if: ${{ success() || failure() }}
        shell: bash
        run: |
          fail=0
          smoke() {
            echo "::group::dotnet run -- $*"
            output=$(dotnet run --project src/CommandLineRunner --framework net9.0 -- "$@" 2>&1) || true
            echo "$output"
            echo "::endgroup::"
            if echo "$output" | grep -qE 'Unhandled exception|System\.[A-Za-z.]+Exception'; then
              echo "::error::Usage rendering crashed for 'help $*' (see jasperfx#441)"
              fail=1
            fi
          }
          smoke help
          smoke help describe
          exit $fail

      - name: smoke-test-aot
        if: ${{ success() || failure() }}
        run: ./build.sh smoke-test-aot
        shell: bash
